{% extends "base.html" %}

{% block content %}
<div class="fixed inset-0 z-20 flex items-center justify-center bg-slate-950/30 px-4 py-10">
  <div class="w-full max-w-2xl rounded-[2rem] border border-slate-200 bg-white p-10 shadow-2xl">
    <div class="space-y-4">
      <p class="text-sm uppercase tracking-[0.32em] text-slate-400">Delete Confirmation</p>
      <h1 class="text-3xl font-semibold tracking-tight text-slate-900">Delete this post?</h1>
      <p class="text-slate-600">This action is permanent. Make sure you want to continue.</p>
    </div>

    <div class="mt-8 rounded-3xl border border-slate-200 bg-slate-50 p-6">
      <h2 class="text-xl font-semibold text-slate-900">{{ post.title }}</h2>
      <p class="mt-2 text-sm leading-relaxed text-slate-600">Category: {{ post.category.name }} • Published: {{ post.published_at|date:"j F Y" }}</p>
    </div>

    <form method="post" class="mt-8 grid gap-4 sm:grid-cols-2">
      {% csrf_token %}
      <button type="submit" class="rounded-2xl bg-rose-600 px-6 py-3 text-sm font-semibold text-white transition hover:bg-rose-700">Yes, delete</button>
      <a href="{% url 'dashboard_home' %}" class="inline-flex items-center justify-center rounded-2xl border border-slate-200 bg-white px-6 py-3 text-sm font-semibold text-slate-700 transition hover:bg-slate-50">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
