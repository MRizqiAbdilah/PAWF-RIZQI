{% extends "base.html" %}

{% block content %}
<section class="mx-auto max-w-3xl px-4 py-12 sm:px-6 lg:px-8">
  <article class="space-y-8 rounded-3xl border border-slate-200 bg-white p-10 shadow-sm">
    <div class="space-y-3">
      <a href="{% url 'category_posts' post.category.slug %}" class="inline-flex items-center rounded-full bg-indigo-50 px-4 py-2 text-xs font-semibold uppercase tracking-[0.32em] text-indigo-700">{{ post.category.name }}</a>
      <h1 class="text-4xl font-semibold tracking-tight text-slate-900">{{ post.title }}</h1>
      <div class="flex flex-wrap items-center gap-4 text-sm text-slate-500">
        <span>{{ post.author.get_full_name|default:post.author.username }}</span>
        <span>•</span>
        <span>{{ post.published_at|date:"j F Y" }}</span>
      </div>
    </div>

    <div class="overflow-hidden rounded-3xl border border-slate-200 bg-slate-100">
      <img src="{{ post.featured_image }}" alt="{{ post.title }}" class="h-80 w-full object-cover" />
    </div>

    <div class="space-y-6 text-base leading-relaxed text-slate-700">
      {{ post.body|linebreaksbr|safe }}
    </div>
  </article>
</section>
{% endblock %}
