{% extends "base.html" %}

{% block title %}Masuk Dashboard{% endblock %}

{% block content %}
<div class="mx-auto max-w-md px-4 py-16 sm:px-6 lg:px-8">
  <div class="rounded-3xl border border-slate-200 bg-white p-10 shadow-sm">
    <div class="space-y-3 text-center">
      <p class="text-sm uppercase tracking-[0.3em] text-slate-400">Halaman Login</p>
      <h1 class="text-3xl font-semibold tracking-tight text-slate-900">Masuk untuk mengelola blog</h1>
    </div>

    <form method="post" class="mt-8 space-y-6">
      {% csrf_token %}
      {{ form.non_field_errors }}
      <div>
        <label for="id_username" class="mb-2 block text-sm font-semibold text-slate-700">Username</label>
        {{ form.username }}
      </div>
      <div>
        <label for="id_password" class="mb-2 block text-sm font-semibold text-slate-700">Password</label>
        {{ form.password }}
      </div>
      <button type="submit" class="w-full rounded-2xl bg-indigo-600 px-6 py-3 text-sm font-semibold text-white transition hover:bg-indigo-700">Masuk</button>
    </form>
  </div>
</div>
{% endblock %}
